[changelog]
header = """
# Changelog
"""

body = """
{% if version -%}
## [{{ version }}](https://github.com/{{ remote.github.owner }}/{{ remote.github.repo }}/releases/tag/{{ version }}) - {{ timestamp | date(format="%Y-%m-%d") }}
{% else -%}
## [Unreleased]
{% endif -%}

{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | upper_first }}
{% for commit in commits -%}
- {% if commit.scope %}**{{ commit.scope }}**: {% endif %}{{ commit.message | upper_first | trim }}{% if commit.breaking %} [BREAKING CHANGE]{% endif %} ([{{ commit.id | truncate(length=7, end="") }}](https://github.com/{{ remote.github.owner }}/{{ remote.github.repo }}/commit/{{ commit.id }}))
{% endfor %}
{% endfor -%}

{% if previous and previous.version -%}
---
**Full Changelog**: https://github.com/{{ remote.github.owner }}/{{ remote.github.repo }}/compare/{{ previous.version }}...{{ version }}
{% endif -%}
"""

trim = true

[git]
conventional_commits = true
filter_unconventional = false
split_commits = false
commit_preprocessors = [
    { pattern = '\(#([0-9]+)\)', replace = "([#${1}](https://github.com/{{ remote.github.owner }}/{{ remote.github.repo }}/issues/${1}))" }
]
commit_parsers = [
    #  { message = "^\\w+!", group = "<!-- 0 -->Breaking Changes" },
    { message = "^feat", group = "<!-- 1 -->Features" },
    { message = "^fix", group = "<!-- 2 -->Bug Fixes" },
    { message = "^refactor", group = "<!-- 3 -->Refactoring" },
    { message = "^docs", group = "<!-- 4 -->Documentation" },
    { message = "^test", group = "<!-- 5 -->Tests" },
    # { message = "^perf", group = "<!-- 6 -->Performance Improvements" },
    # { message = "^style", group = "<!-- 7 -->Code Style" },
    # { message = "^build", group = "<!-- 8 -->Build System" },
    # { message = "^ci", group = "<!-- 9 -->Continuous Integration" },
    # { message = "^chore", group = "<!-- 10 -->Chores" },
    # { message = "^revert", group = "<!-- 11 -->Reverts" },
    # { message = "^security", group = "<!-- 12 -->Security" },
    { message = "^.*", skip = true },
]
protect_breaking_commits = false
filter_commits = true
tag_pattern = "v[0-9].*"
topo_order = false
sort_commits = "oldest"
